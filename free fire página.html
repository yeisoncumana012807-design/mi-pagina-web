                </button>
            </div>
        </div>

    <script>
        function startLoading(btn, url) {
            document.querySelectorAll('.btn-social').forEach(b => b.style.pointerEvents = 'none');
            const bar = btn.querySelector('.loading-bar');
            const wrapper = btn.querySelector('.content-wrapper');
            const percent = btn.querySelector('.percent-text');
            wrapper.style.opacity = '0';
            percent.style.display = 'block';
            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                bar.style.width = progress + '%';
                percent.innerText = progress + '%';
                if (progress >= 100) { clearInterval(interval); window.location.href = url; }
            }, 60);
        }
    </script>
